<!DOCTYPE html>
<html>
<head>
  <title>Color Change Example</title>
  <style>
    #colorBox 
	{
      width: 300px;
      height: 200px;
      border: 2px solid black;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    button
	{
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Click a button to change the background color</h2>
  
  <button onclick="changeColor('red')">Red</button>
  <button onclick="changeColor('green')">Green</button>
  <button onclick="changeColor('blue')">Blue</button>
  
  <div id="colorBox">Background Color Box</div>
  
  <script>
    function changeColor(color)
	{
      let confirmation = confirm(`Do you really want to change the background color to ${color}?`);
      if (confirmation) 
	  {
        document.getElementById("colorBox").style.backgroundColor = color;
      }
    }
  </script>
</body>
</html>
